<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#313032",
                        "surface-bright": "#39393b",
                        "background": "#131315",
                        "surface-variant": "#353437",
                        "tertiary": "#c8c6c8",
                        "surface-container-high": "#2a2a2c",
                        "on-background": "#e5e1e4",
                        "inverse-surface": "#e5e1e4",
                        "on-tertiary-container": "#2a292c",
                        "on-secondary-fixed-variant": "#004c6e",
                        "inverse-primary": "#6d3bd7",
                        "tertiary-container": "#929093",
                        "primary-fixed-dim": "#d0bcff",
                        "on-tertiary-fixed": "#1b1b1d",
                        "secondary-container": "#00a2e6",
                        "on-secondary-fixed": "#001e2f",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#303032",
                        "on-primary": "#3c0091",
                        "surface-container-highest": "#353437",
                        "surface": "#131315",
                        "surface-container": "#201f22",
                        "on-surface": "#e5e1e4",
                        "outline-variant": "#494454",
                        "on-secondary-container": "#00344e",
                        "on-secondary": "#00344d",
                        "on-primary-fixed": "#23005c",
                        "primary": "#d0bcff",
                        "secondary": "#89ceff",
                        "primary-container": "#a078ff",
                        "on-primary-fixed-variant": "#5516be",
                        "on-error": "#690005",
                        "primary-fixed": "#e9ddff",
                        "secondary-fixed": "#c9e6ff",
                        "surface-container-low": "#1c1b1d",
                        "on-tertiary-fixed-variant": "#474649",
                        "tertiary-fixed-dim": "#c8c6c8",
                        "secondary-fixed-dim": "#89ceff",
                        "tertiary-fixed": "#e5e1e4",
                        "error-container": "#93000a",
                        "surface-tint": "#d0bcff",
                        "surface-dim": "#131315",
                        "on-primary-container": "#340080",
                        "on-surface-variant": "#cbc3d7",
                        "error": "#ffb4ab",
                        "outline": "#958ea0",
                        "surface-container-lowest": "#0e0e10"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kanji-watermark {
            user-select: none;
            pointer-events: none;
        }
        .soft-glow {
            box-shadow: 0 0 40px 5px rgba(208, 188, 255, 0.15);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen overflow-hidden">
<main class="relative flex flex-col items-center justify-center min-h-screen w-full px-6">
<div class="kanji-watermark absolute inset-0 flex items-center justify-center overflow-hidden">
<span class="text-[40rem] font-headline text-white/[0.02] leading-none transform -translate-y-12">富士</span>
</div>
<div class="relative z-10 flex flex-col items-center text-center max-w-2xl w-full">
<h1 class="font-headline font-light text-[6rem] md:text-[8rem] tracking-[-0.05em] text-on-surface leading-none mb-16">
                fuji
            </h1>
<div class="group relative flex flex-col items-center gap-8 w-full">
<button class="soft-glow bg-primary hover:bg-primary-container text-on-primary px-8 py-4 rounded-lg flex items-center gap-3 transition-all duration-300 transform active:scale-95 group">
<span class="font-headline font-medium text-lg uppercase tracking-widest">Open Folder</span>
<span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="w-full max-w-sm mt-4">
<div class="border border-dashed border-outline-variant/40 rounded-xl py-12 px-8 flex flex-col items-center justify-center transition-colors hover:border-primary/40 group/drop">
<span class="material-symbols-outlined text-outline/40 mb-3 group-hover/drop:text-secondary transition-colors">folder_zip</span>
<p class="text-on-surface-variant font-label text-sm tracking-tight opacity-60">
                            or drag a folder here
                        </p>
</div>
</div>
</div>
<div class="mt-24 flex items-center gap-8 justify-center">
<div class="flex flex-col items-center gap-1">
<span class="text-[10px] uppercase tracking-[0.2em] text-outline/50 font-label">Engine</span>
<span class="text-secondary font-headline font-medium text-xs">MONOLITH V1</span>
</div>
<div class="h-8 w-px bg-outline-variant/20"></div>
<div class="flex flex-col items-center gap-1">
<span class="text-[10px] uppercase tracking-[0.2em] text-outline/50 font-label">Architecture</span>
<span class="text-primary font-headline font-medium text-xs">PRECISION-X</span>
</div>
</div>
</div>
<footer class="absolute bottom-8 left-0 right-0 flex justify-center items-center">
<div class="flex items-center gap-4 px-6">
<span class="font-headline text-[10px] uppercase tracking-[0.3em] text-outline/30 font-bold">
                    v2.4.0-pro
                </span>
</div>
</footer>
<div class="absolute top-8 left-8">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-primary/40 animate-pulse"></div>
<span class="font-headline text-[10px] uppercase tracking-widest text-on-surface-variant/50">System Stable</span>
</div>
</div>
<div class="absolute top-8 right-8 flex gap-6">
<button class="text-on-surface-variant/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">settings</span>
</button>
<button class="text-on-surface-variant/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">help</span>
</button>
</div>
</main>
<div class="fixed inset-0 pointer-events-none border-[1px] border-white/[0.03] m-4 z-50"></div>
<div class="fixed inset-0 pointer-events-none bg-gradient-to-b from-transparent via-transparent to-primary/[0.02]"></div>
</body></html>
